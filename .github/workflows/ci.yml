name: CI

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'src-tauri/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'src-tauri/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/ci.yml'

jobs:
  test:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2.9.1
        with:
          workspaces: '. -> target'

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - name: Run tests
        run: cargo test -p cloudreve-sync -p cloudreve-api

      - name: Check desktop crate compiles
        # tauri-build requires the frontendDist directory to exist,
        # but type-checking the Rust code doesn't need a real frontend build
        # need to add ci for frontend part
        run: |
          mkdir -p ui/dist
          cargo check -p cloudreve-desktop
